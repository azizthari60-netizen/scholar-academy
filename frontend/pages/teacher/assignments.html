<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignments | Teacher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
  </head>
  <body data-page="assignments">
    <div class="app-shell">
      <aside class="sidebar"><div class="brand-box"><div class="mark">SC</div><div><h1>The Scholar</h1><p>Teacher Portal</p></div></div><nav class="sidebar-nav"></nav></aside>
      <main class="main-panel">
        <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar"><div><h2>Assignments</h2><p>Create and manage student assignments.</p></div><div class="topbar-actions"><div class="user-chip"><div class="avatar" id="userAvatar">T</div><span id="userName">Teacher</span></div><button class="logout-btn" id="logoutBtn" type="button">Logout</button></div></div>
        <div class="panel" style="margin-bottom:16px"><h4>Create Assignment</h4><form id="assignmentForm" class="form-grid two-col" style="margin-top:12px">
          <div class="form-field"><label>Title</label><input name="title" required /></div>
          <div class="form-field"><label>Subject</label><input name="subject" required /></div>
          <div class="form-field"><label>Program</label><select name="program"><option>Pre-Medical</option><option>Pre-Engineering</option><option>Computer Science</option></select></div>
          <div class="form-field"><label>Due Date</label><input name="dueDate" type="date" required /></div>
          <div class="form-field" style="grid-column:1/-1"><label>Description</label><textarea name="description"></textarea></div>
          <div><button class="btn-primary" type="submit">Create Assignment</button></div>
        </form></div>
        <div class="panel table-card"><table><thead><tr><th>Title</th><th>Program</th><th>Due Date</th><th>Status</th></tr></thead><tbody id="dataTableBody"></tbody></table></div>
      </main>
    </div>
    <script src="../../assets/js/api.js"></script><script src="../../assets/js/dashboard-common.js"></script><script src="../../assets/js/teacher-pages.js"></script>
  </body>
</html>
