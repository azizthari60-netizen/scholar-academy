<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance | Teacher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
  </head>
  <body data-page="attendance">
    <div class="app-shell">
      <aside class="sidebar"><div class="brand-box"><div class="mark">SC</div><div><h1>The Scholar</h1><p>Teacher Portal</p></div></div><nav class="sidebar-nav"></nav></aside>
      <main class="main-panel">
        <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar"><div><h2>Attendance</h2><p>Mark daily student attendance.</p></div><div class="topbar-actions"><div class="user-chip"><div class="avatar" id="userAvatar">T</div><span id="userName">Teacher</span></div><button class="logout-btn" id="logoutBtn" type="button">Logout</button></div></div>
        <div class="page-toolbar">
          <div class="form-grid two-col" style="flex:1">
            <div class="form-field"><label>Date</label><input type="date" id="attendanceDate" /></div>
            <div class="form-field"><label>Subject</label><input id="attendanceSubject" placeholder="Physics" /></div>
          </div>
          <button class="btn-primary" id="saveAttendance" type="button">Save Attendance</button>
        </div>
        <div class="panel table-card"><table><thead><tr><th>Student</th><th>Roll No</th><th>Status</th></tr></thead><tbody id="attendanceBody"></tbody></table></div>
      </main>
    </div>
    <script src="../../assets/js/api.js"></script><script src="../../assets/js/dashboard-common.js"></script><script src="../../assets/js/teacher-pages.js"></script>
  </body>
</html>
