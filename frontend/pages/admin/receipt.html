<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receipt | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-box"><div class="mark">SC</div><div><h1>The Scholar</h1><p>Admin Console</p></div></div>
        <nav class="sidebar-nav"></nav>
      </aside>
      <main class="main-panel">
        <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar">
          <div><h2>Fee Receipt</h2><p>Review and print the receipt for a fee payment.</p></div>
          <div class="topbar-actions"><div class="user-chip"><div class="avatar" id="userAvatar">A</div><span id="userName">Admin</span></div><button class="logout-btn" id="logoutBtn" type="button">Logout</button></div>
        </div>
        <section class="panel" id="receiptArea"><div class="panel-header"><h4>Receipt</h4></div><div id="receiptContent" class="receipt-frame">Loading receipt…</div></section>
      </main>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/dashboard-common.js"></script>
    <script src="../../assets/js/receipt.js"></script>
  </body>
</html>
