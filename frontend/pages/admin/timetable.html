<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timetable | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
  </head>
  <body data-page="timetable">
    <div class="app-shell">
      <aside class="sidebar"><div class="brand-box"><div class="mark">SC</div><div><h1>The Scholar</h1><p>Admin Console</p></div></div><nav class="sidebar-nav"></nav></aside>
      <main class="main-panel">
        <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar"><div><h2>Timetable</h2><p>Manage class schedules.</p></div><div class="topbar-actions"><div class="user-chip"><div class="avatar" id="userAvatar">A</div><span id="userName">Admin</span></div><button class="logout-btn" id="logoutBtn" type="button">Logout</button></div></div>
        <div class="page-toolbar"><h3>Class Schedule</h3><button class="btn-primary" id="addBtn" type="button">+ Add Entry</button></div>
        <div class="panel table-card"><table><thead><tr><th>Day</th><th>Time</th><th>Subject</th><th>Program</th><th>Room</th><th>Actions</th></tr></thead><tbody id="dataTableBody"></tbody></table></div>
      </main>
    </div>
    <div class="modal-overlay" id="formModal"><div class="modal"><h3>Add Timetable Entry</h3><form id="dataForm" class="form-grid two-col">
      <div class="form-field"><label>Day</label><select name="day" required><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option></select></div>
      <div class="form-field"><label>Teacher</label><select name="teacher"></select></div>
      <div class="form-field"><label>Start Time</label><input name="startTime" placeholder="09:00" required /></div>
      <div class="form-field"><label>End Time</label><input name="endTime" placeholder="10:00" required /></div>
      <div class="form-field"><label>Subject</label><input name="subject" required /></div>
      <div class="form-field"><label>Program</label><select name="program" required><option>Pre-Medical</option><option>Pre-Engineering</option><option>Computer Science</option></select></div>
      <div class="form-field"><label>Section</label><input name="section" value="A" /></div>
      <div class="form-field"><label>Classroom</label><input name="classroom" /></div>
      <div class="modal-actions" style="grid-column:1/-1"><button class="btn-secondary" id="cancelBtn" type="button">Cancel</button><button class="btn-primary" type="submit">Save</button></div>
    </form></div></div>
    <script src="../../assets/js/api.js"></script><script src="../../assets/js/dashboard-common.js"></script><script src="../../assets/js/admin-pages.js"></script>
  </body>
</html>
