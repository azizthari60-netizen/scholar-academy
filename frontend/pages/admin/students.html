<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
  </head>
  <body data-page="students">
    <div class="app-shell">
      <aside class="sidebar"><div class="brand-box"><div class="mark">SC</div><div><h1>The Scholar</h1><p>Admin Console</p></div></div><nav class="sidebar-nav"></nav></aside>
      <main class="main-panel">
        <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar"><div><h2>Students</h2><p>Manage student records and enrollment.</p></div><div class="topbar-actions"><div class="user-chip"><div class="avatar" id="userAvatar">A</div><span id="userName">Admin</span></div><button class="logout-btn" id="logoutBtn" type="button">Logout</button></div></div>
        <div class="page-toolbar"><h3>All Students</h3><button class="btn-primary" id="addBtn" type="button">+ Add Student</button></div>
        <div class="panel table-card"><table><thead><tr><th>Roll No</th><th>Name</th><th>Program</th><th>Batch</th><th>Attendance</th><th>Actions</th></tr></thead><tbody id="dataTableBody"></tbody></table></div>
      </main>
    </div>
    <div class="modal-overlay" id="formModal"><div class="modal"><h3 id="modalTitle">Add Student</h3><form id="dataForm" class="form-grid two-col">
      <div class="form-field"><label>Name</label><input name="name" required /></div>
      <div class="form-field"><label>Email</label><input name="email" type="email" required /></div>
      <div class="form-field"><label>Password</label><input name="password" type="password" required /></div>
      <div class="form-field"><label>Phone</label><input name="phone" /></div>
      <div class="form-field"><label>Roll Number</label><input name="rollNumber" required /></div>
      <div class="form-field"><label>Program</label><select name="program" required><option>Pre-Medical</option><option>Pre-Engineering</option><option>Computer Science</option></select></div>
      <div class="form-field"><label>Batch</label><input name="batch" value="2025-26" /></div>
      <div class="form-field"><label>Section</label><input name="section" value="A" /></div>
      <div class="form-field"><label>Guardian Name</label><input name="guardianName" /></div>
      <div class="form-field"><label>Guardian Phone</label><input name="guardianPhone" /></div>
      <div class="modal-actions" style="grid-column:1/-1"><button class="btn-secondary" id="cancelBtn" type="button">Cancel</button><button class="btn-primary" type="submit">Save</button></div>
    </form></div></div>
    <script src="../../assets/js/api.js"></script><script src="../../assets/js/dashboard-common.js"></script><script src="../../assets/js/admin-pages.js"></script>
  </body>
</html>
