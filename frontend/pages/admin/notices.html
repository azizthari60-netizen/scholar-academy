<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notices | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
  </head>
  <body data-page="notices">
    <div class="app-shell">
      <aside class="sidebar"><div class="brand-box"><div class="mark">SC</div><div><h1>The Scholar</h1><p>Admin Console</p></div></div><nav class="sidebar-nav"></nav></aside>
      <main class="main-panel">
        <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar"><div><h2>Notices</h2><p>Post announcements for students and staff.</p></div><div class="topbar-actions"><div class="user-chip"><div class="avatar" id="userAvatar">A</div><span id="userName">Admin</span></div><button class="logout-btn" id="logoutBtn" type="button">Logout</button></div></div>
        <div class="page-toolbar"><h3>All Notices</h3><button class="btn-primary" id="addBtn" type="button">+ Post Notice</button></div>
        <div class="panel table-card"><table><thead><tr><th>Title</th><th>Audience</th><th>Date</th><th>Actions</th></tr></thead><tbody id="dataTableBody"></tbody></table></div>
      </main>
    </div>
    <div class="modal-overlay" id="formModal"><div class="modal"><h3>Post Notice</h3><form id="dataForm" class="form-grid">
      <div class="form-field"><label>Title</label><input name="title" required /></div>
      <div class="form-field"><label>Content</label><textarea name="content" required></textarea></div>
      <div class="form-field"><label>Audience</label><select name="targetRole"><option value="all">Everyone</option><option value="student">Students</option><option value="teacher">Teachers</option></select></div>
      <div class="form-field"><label><input type="checkbox" name="isPinned" /> Pin this notice</label></div>
      <div class="modal-actions"><button class="btn-secondary" id="cancelBtn" type="button">Cancel</button><button class="btn-primary" type="submit">Post</button></div>
    </form></div></div>
    <script src="../../assets/js/api.js"></script><script src="../../assets/js/dashboard-common.js"></script><script src="../../assets/js/admin-pages.js"></script>
  </body>
</html>
