<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Portal | The Scholar Coaching Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
  </head>
  <body data-page="dashboard">
    <div class="app-shell">
      <aside class="sidebar"><div class="brand-box"><div class="mark">SC</div><div><h1>The Scholar</h1><p>Student Portal</p></div></div><nav class="sidebar-nav"></nav><div class="sidebar-footer"><strong>Program</strong><p id="programInfo">Loading...</p></div></aside>
      <main class="main-panel">
        <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar"><div><h2>Student Dashboard</h2><p>Welcome back, <span id="welcomeName">Student</span>.</p></div><div class="topbar-actions"><div class="user-chip"><div class="avatar" id="userAvatar">S</div><span id="userName">Student</span></div><button class="logout-btn" id="logoutBtn" type="button">Logout</button></div></div>
        <section class="stats-grid">
          <article class="stat-card"><div class="label">Attendance</div><div class="value" id="statAttendance">—</div></article>
          <article class="stat-card"><div class="label">Assignments</div><div class="value" id="statAssignments">—</div><div class="delta"><span id="statPending">—</span> due soon</div></article>
          <article class="stat-card"><div class="label">Average Score</div><div class="value" id="statScore">—</div></article>
          <article class="stat-card"><div class="label">Program</div><div class="value" style="font-size:1.1rem">Active</div></article>
        </section>
        <section class="dashboard-grid">
          <div class="panel"><div class="panel-header"><h4>Upcoming Schedule</h4><a class="muted" href="timetable.html">Full timetable</a></div><div class="list" id="scheduleList"></div></div>
          <div class="panel"><div class="panel-header"><h4>Performance Snapshot</h4></div><div class="progress-stack" id="progressStack"></div></div>
        </section>
      </main>
    </div>
    <script src="../../assets/js/api.js"></script><script src="../../assets/js/dashboard-common.js"></script><script src="../../assets/js/student-pages.js"></script>
  </body>
</html>
